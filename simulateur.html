<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur - RatioCinemaSim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">RatioCinemaSim</a>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="simulateur.html" class="active">Simulateur</a>
            <a href="tutoriels.html">Tutoriels</a>
            <a href="fichiers-attendus.html">Fichiers Attendus</a>
        </div>
    </nav>

    <header>
        <div class="control-row">
            <div class="control-group">
                <span class="label-group">🏢 Écran Salle :</span>
                <button class="btn-toggle btn-room" onclick="setRoom(1.78, this)">Ratio 1.78</button>
                <button class="btn-toggle btn-room" onclick="setRoom(1.85, this)">Salle 1.85 (Flat)</button>
                <button class="btn-toggle btn-room" onclick="setRoom(1.90, this)">Salle 1.90 (Full)</button>
                <button class="btn-toggle btn-room active" onclick="setRoom(2.39, this)">Salle 2.39 (Scope)</button>
            </div>

            <div class="control-group">
                <span class="label-group">💾 Ratio DCP Container 2K :</span>
                <button class="btn-toggle btn-dcp" onclick="setDCP(1.78, this)">Classic Screen (1.78)</button>
                <button class="btn-toggle btn-dcp" onclick="setDCP(1.85, this)">DCP Flat (1.85)</button>
                <button class="btn-toggle btn-dcp" onclick="setDCP(1.90, this)">DCP Full (1.90)</button>
                <button class="btn-toggle btn-dcp active" onclick="setDCP(2.39, this)">DCP Scope (2.39)</button>
            </div>
        </div>

        <div class="control-row" style="margin-top: 5px;">
            <div class="control-group">
                <span class="label-group">🔍 Afficher Cache :</span>
                <button class="btn-toggle btn-mask" onclick="setActiveMask(1.33, this)">Format 1.33</button>
                <button class="btn-toggle btn-mask" onclick="setActiveMask(1.37, this)">Format 1.37</button>
                <button class="btn-toggle btn-mask" onclick="setActiveMask(1.66, this)">Format 1.66</button>
                <button class="btn-toggle btn-mask" onclick="setActiveMask(1.85, this)">Format 1.85</button>
                <button class="btn-toggle btn-mask active" onclick="setActiveMask(0, this)">Sans Cache</button>
        </div>


            <input type="file" id="videoInput" accept="video/mp4,video/quicktime,video/x-matroska,.mov,.mkv" style="display:none">
            <button class="btn-toggle" style="background:#000000; color:white; border-color:#333; margin-left: 20px;" onclick="document.getElementById('videoInput').click()">📁 Charger Vidéo (MP4, MOV)</button>

            <div class="video-meta-banner" id="metaBanner" style="display: none;">
                <div>RES: <span class="meta-val" id="metaRes">-</span></div>
                <div>RATIO: <span class="meta-val" id="metaRatio">-</span></div>
                <div>FPS SOURCE: <span class="meta-val" id="metaFps">-</span></div>
            </div>
        </div>
    </header>

    <div class="simulator-viewport" id="viewport">
        <div class="cinema-wrapper" id="cinemaWrapper">
            
            <div class="salle-physique-toile" id="salleToile">
                <div class="dcp-container" id="dcpContainer">
                    
                    <div class="mask-overlay mask-left" id="maskLeft"></div>
                    <div class="mask-overlay mask-right" id="maskRight"></div>
                    
                    <video id="videoPlayer" controls autoplay muted loop></video>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p id="info">Système prêt. Ratios du simulateur et calculs géométriques réalignés.</p>
    </footer>

    <script>
        const wrapper = document.getElementById('cinemaWrapper');
        const viewport = document.getElementById('viewport');
        const salleToile = document.getElementById('salleToile');
        const dcpContainer = document.getElementById('dcpContainer');
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const maskLeft = document.getElementById('maskLeft');
        const maskRight = document.getElementById('maskRight');

        const metaBanner = document.getElementById('metaBanner');
        const metaRes = document.getElementById('metaRes');
        const metaRatio = document.getElementById('metaRatio');
        const metaFps = document.getElementById('metaFps');

        let roomRatio = 2.39;
        let dcpRatio = 2.39;
        let activeMaskRatio = 0; 

        let frameCount = 0;
        let fpsIntervalStartTime = 0;

        function resizeSimulator() {
            const viewWidth = viewport.clientWidth;
            const viewHeight = viewport.clientHeight;
            
            const scaleX = viewWidth / 1920;
            const scaleY = viewHeight / 1080;
            const scale = Math.min(scaleX, scaleY);

            wrapper.style.transform = `scale(${scale})`;
        }

        function updateRatios() {
            const heightRef = 585; 
            let currentToileWidth = 1400;

            if (roomRatio === 2.39) { currentToileWidth = 1400; } 
            else if (roomRatio === 1.90) { currentToileWidth = 1111; } 
            else if (roomRatio === 1.85) { currentToileWidth = 1082; }
            else if (roomRatio === 1.78) { currentToileWidth = 1042; } 

            salleToile.style.width = `${currentToileWidth}px`;
            salleToile.style.height = `${heightRef}px`;

            let currentDCPWidth = currentToileWidth;
            let currentDCPHeight = heightRef;

            if (dcpRatio <= roomRatio) {
                currentDCPWidth = heightRef * dcpRatio;
                dcpContainer.style.width = `${currentDCPWidth}px`;
                dcpContainer.style.height = `100%`;
                currentDCPHeight = heightRef;
            } else {
                dcpContainer.style.width = `100%`;
                currentDCPHeight = currentToileWidth / dcpRatio;
                dcpContainer.style.height = `${currentDCPHeight}px`;
                currentDCPWidth = currentToileWidth;
            }

            if (activeMaskRatio > 0) {
                const targetFilmWidth = currentDCPHeight * activeMaskRatio;
                const sideWidth = (currentDCPWidth - targetFilmWidth) / 2;

                if (sideWidth > 0) {
                    maskLeft.style.display = 'block';
                    maskRight.style.display = 'block';
                    maskLeft.style.width = `${sideWidth}px`;
                    maskRight.style.width = `${sideWidth}px`;
                } else {
                    maskLeft.style.display = 'none';
                    maskRight.style.display = 'none';
                }
            } else {
                maskLeft.style.display = 'none';
                maskRight.style.display = 'none';
            }
        }

        videoPlayer.addEventListener('loadedmetadata', function() {
            const w = videoPlayer.videoWidth;
            const h = videoPlayer.videoHeight;
            
            const calculatedRatio = (w / h).toFixed(2);

            metaRes.textContent = `${w}x${h}`;
            metaRatio.textContent = `${calculatedRatio} (1:${calculatedRatio})`;
            metaBanner.style.display = 'flex'; 
            
            frameCount = 0;
            fpsIntervalStartTime = 0;
            metaFps.textContent = "Calcul...";

            if (videoPlayer.requestVideoFrameCallback) {
                videoPlayer.requestVideoFrameCallback(monitorFps);
            } else {
                metaFps.textContent = "Non supporté";
            }
        });

        function monitorFps(now, metadata) {
            if (fpsIntervalStartTime === 0) {
                fpsIntervalStartTime = now;
            }
            
            frameCount++;
            const elapsed = now - fpsIntervalStartTime;

            if (elapsed >= 1000) {
                const realFps = Math.round((frameCount * 1000) / elapsed);
                metaFps.textContent = `${realFps} Img/s`;
                
                frameCount = 0;
                fpsIntervalStartTime = now;
            }

            if (!videoPlayer.paused && !videoPlayer.ended) {
                videoPlayer.requestVideoFrameCallback(monitorFps);
            }
        }

        videoPlayer.addEventListener('play', function() {
            if (videoPlayer.requestVideoFrameCallback) {
                videoPlayer.requestVideoFrameCallback(monitorFps);
            }
        });

        function setActiveMask(ratio, btn) {
            document.querySelectorAll('.btn-mask').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeMaskRatio = ratio;
            updateRatios();
        }

        function setRoom(ratio, btn) {
            roomRatio = ratio;
            document.querySelectorAll('.btn-room').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateRatios();
        }

        function setDCP(ratio, btn) {
            dcpRatio = ratio;
            document.querySelectorAll('.btn-dcp').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateRatios();
        }

        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) videoPlayer.src = URL.createObjectURL(file);
        });

        window.addEventListener('resize', () => {
            resizeSimulator();
            updateRatios();
        });
        
        resizeSimulator();
        updateRatios();
    </script>
</body>
</html>
