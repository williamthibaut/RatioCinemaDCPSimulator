<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur easyDCP 2K - Salle de Cinéma</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #050505;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: rgba(17, 17, 17, 0.95);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            z-index: 100;
            border-bottom: 2px solid #222;
            backdrop-filter: blur(10px);
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            width: 100%;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .label-group {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: bold;
            margin-right: 5px;
        }

        .btn-toggle {
            padding: 6px 12px;
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-toggle:hover { border-color: #666; color: #fff; }
        
        /* Couleurs des boutons */
        .btn-room.active { background: #27ae60; color: white; border-color: #2ecc71; }
        .btn-dcp.active { background: #2980b9; color: white; border-color: #3498db; }
        .btn-mask.active { background: #e67e22; color: white; border-color: #f39c12; }

        /* --- LE CONTENEUR MAÎTRE (RÉSOLUTION FIXE VIRTUELLE) --- */
        .simulator-viewport {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }

        .cinema-wrapper {
            position: relative;
            width: 1920px;
            height: 1080px;
            background-image: url('12.jpg'); 
            background-size: cover;
            background-position: center;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- LA TOILE PHYSIQUE DE LA SALLE --- */
        .salle-physique-toile {
            position: absolute;
            
            /* --- ON A RE-MONTÉ L'ÉCRAN ICI --- */
            /* Précédemment centré automatiquement, on le force maintenant plus haut (150px du haut au lieu de ~250px) */
            top: 150px; 
            
            width: 1400px; 
            height: 585px; 
            background: #111; 
            border: 6px solid #1a1a1a;
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.4s ease, height 0.4s ease;
            overflow: hidden;
            z-index: 5;
        }

        /* --- LE CONTENEUR EASYDCP --- */
        .dcp-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            transition: width 0.4s ease, height 0.4s ease;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- SYSTEME DE CACHES / MASQUES ROUGES TRANSPARENTS --- */
        /* Ils se positionnent de manière absolue à l'intérieur du conteneur DCP */
        .mask-overlay {
            position: absolute;
            top: 0;
            bottom: 0;
            background: rgba(230, 9, 20, 0.25); /* Rouge à 25% d'opacité pour que ce soit bien visible */
            border-right: 2px dashed #ff4d4d;
            border-left: 2px dashed #ff4d4d;
            pointer-events: none; /* Laisse passer les clics sur le lecteur */
            display: none; /* Caché par défaut */
            z-index: 15;
        }

        /* Quand le cache 1.33 est actif, on applique ces dimensions */
        /* En hauteur 100%, le format 1.33 (4:3) doit occuper une largeur égale à sa Hauteur x 1.333 */
        .dcp-container.has-mask-133 .mask-overlay {
            display: block;
            /* On calcule la zone restante sur les côtés extérieurs */
            /* En gros, on prend tout ce qui dépasse des 1.33 centraux */
            width: calc((100% - (100vh * 0.541 * 1.333)) / 2); 
        }
        
        .mask-left { left: 0; border-left: none; }
        .mask-right { right: 0; border-right: none; }


        footer { background: #111; padding: 12px; text-align: center; font-size: 13px; z-index: 100; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div class="control-row">
            <div class="control-group">
                <span class="label-group">🏢 Écran Salle :</span>
                <button class="btn-toggle btn-room" onclick="setRoom(1.85, this)">Salle 1.85 (Flat)</button>
                <button class="btn-toggle btn-room" onclick="setRoom(1.90, this)">Salle 1.90 (Full)</button>
                <button class="btn-toggle btn-room active" onclick="setRoom(2.39, this)">Salle 2.39 (Scope)</button>
            </div>

            <div class="control-group">
                <span class="label-group">💾 easyDCP 2K :</span>
                <button class="btn-toggle btn-dcp" onclick="setDCP(1.85, this)">DCP Flat (1.85)</button>
                <button class="btn-toggle btn-dcp" onclick="setDCP(1.90, this)">DCP Full (1.90)</button>
                <button class="btn-toggle btn-dcp active" onclick="setDCP(2.39, this)">DCP Scope (2.39)</button>
            </div>
        </div>

        <div class="control-row" style="margin-top: 5px;">
            <div class="control-group">
                <span class="label-group">🔍 Afficher Repère :</span>
                <button class="btn-toggle btn-mask" onclick="toggleMask('1.33', this)">Cache Film 1.33 (4:3)</button>
                <button class="btn-toggle btn-mask" onclick="toggleMask('none', this)">Désactiver les caches</button>
            </div>

            <input type="file" id="videoInput" accept="video/mp4,video/mov,video/mkv" style="display:none">
            <button class="btn-toggle" style="background:#e50914; color:white; border-color:#b80710; margin-left: 20px;" onclick="document.getElementById('videoInput').click()">📁 Charger Vidéo (MP4)</button>
        </div>
    </header>

    <div class="simulator-viewport" id="viewport">
        <div class="cinema-wrapper" id="cinemaWrapper">
            
            <div class="salle-physique-toile" id="salleToile">
                <div class="dcp-container" id="dcpContainer">
                    
                    <div class="mask-overlay mask-left" id="maskLeft"></div>
                    <div class="mask-overlay mask-right" id="maskRight"></div>
                    
                    <video id="videoPlayer" controls autoplay muted loop></video>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p id="info">Système prêt. Écran rehaussé. Caches de vérification 1.33 disponibles.</p>
    </footer>

    <script>
        const wrapper = document.getElementById('cinemaWrapper');
        const viewport = document.getElementById('viewport');
        const salleToile = document.getElementById('salleToile');
        const dcpContainer = document.getElementById('dcpContainer');
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const maskLeft = document.getElementById('maskLeft');
        const maskRight = document.getElementById('maskRight');

        let roomRatio = 2.39;
        let dcpRatio = 2.39;

        function resizeSimulator() {
            const viewWidth = viewport.clientWidth;
            const viewHeight = viewport.clientHeight;
            
            const scaleX = viewWidth / 1920;
            const scaleY = viewHeight / 1080;
            const scale = Math.min(scaleX, scaleY);

            wrapper.style.transform = `scale(${scale})`;
        }

        function updateRatios() {
            const heightRef = 585; 
            let currentToileWidth = 1400;

            if (roomRatio === 2.39) {
                currentToileWidth = 1400;
            } else if (roomRatio === 1.90) {
                currentToileWidth = 1111;
            } else if (roomRatio === 1.85) {
                currentToileWidth = 1082;
            }

            salleToile.style.width = `${currentToileWidth}px`;
            salleToile.style.height = `${heightRef}px`;

            if (dcpRatio <= roomRatio) {
                const dcpWidth = heightRef * dcpRatio;
                dcpContainer.style.width = `${dcpWidth}px`;
                dcpContainer.style.height = `100%`;
            } else {
                dcpContainer.style.width = `100%`;
                const targetHeight = currentToileWidth / dcpRatio;
                dcpContainer.style.height = `${targetHeight}px`;
            }

            // Recalcul de la taille des caches rouges selon le container actuel
            updateMaskSizes(heightRef);
        }

        function toggleMask(type, btn) {
            document.querySelectorAll('.btn-mask').forEach(b => b.classList.remove('active'));
            
            if (type === '1.33') {
                btn.classList.add('active');
                dcpContainer.classList.add('has-mask-133');
            } else {
                dcpContainer.classList.remove('has-mask-133');
            }
            updateRatios();
        }

        function updateMaskSizes(heightRef) {
            // Largeur réelle du conteneur DCP actuel en pixels
            const currentDCPWidth = dcpContainer.clientWidth;
            
            // Largeur idéale que devrait faire un film 1.33 (Hauteur fixe de 585px * 1.333)
            const target133Width = heightRef * 1.3333;
            
            // On calcule la taille de chaque bande rouge (ce qui reste sur les côtés)
            const sideWidth = (currentDCPWidth - target133Width) / 2;
            
            if (sideWidth > 0 && dcpContainer.classList.contains('has-mask-133')) {
                maskLeft.style.display = 'block';
                maskRight.style.display = 'block';
                maskLeft.style.width = `${sideWidth}px`;
                maskRight.style.width = `${sideWidth}px`;
            } else {
                maskLeft.style.display = 'none';
                maskRight.style.display = 'none';
            }
        }

        function setRoom(ratio, btn) {
            roomRatio = ratio;
            document.querySelectorAll('.btn-room').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateRatios();
        }

        function setDCP(ratio, btn) {
            dcpRatio = ratio;
            document.querySelectorAll('.btn-dcp').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateRatios();
        }

        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) videoPlayer.src = URL.createObjectURL(file);
        });

        window.addEventListener('resize', () => {
            resizeSimulator();
            updateRatios();
        });
        
        resizeSimulator();
        updateRatios();
    </script>
</body>
</html>
